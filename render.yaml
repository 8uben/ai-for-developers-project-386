databases:
  - name: call-booking-db
    plan: free
    databaseName: call_booking

services:
  - type: web
    name: call-booking
    runtime: image
    repo: https://github.com/hexlet/ai-for-developers-project-386
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: call-booking-db
          property: connectionString
