# Локальный запуск фронтенда против mock-сервера Prism, поднятого из контракта.
# Prism играет роль "отдельно запущенного бэкенда": валидирует запросы по OpenAPI
# и отдаёт примеры ответов согласно контракту.
services:
  prism:
    image: stoplight/prism:5
    # -m false: одиночный процесс (multiprocess-режим несовместим с этим образом).
    command: mock -h 0.0.0.0 -p 4010 -m false /tmp/openapi.yaml
    volumes:
      - ./openapi.yaml:/tmp/openapi.yaml:ro
    ports:
      - "4010:4010"

  frontend:
    build:
      context: ./frontend
    environment:
      # Фронтенд ходит в API только через этот базовый URL (по контракту).
      VITE_API_BASE_URL: http://localhost:4010
    volumes:
      - ./frontend/src:/app/src:ro
    ports:
      - "5173:5173"
    depends_on:
      - prism

networks:
  default:
    ipam:
      config:
        - subnet: 172.31.0.0/24
